# .github/workflows/ndk-build.yml
name: Build JNI with ImGui for Android 10+

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false
    
    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      with:
        packages: ndk-bundle
       
    - name: Compile JNI with ImGui for Android 10+
      run: |
        if [ ! -d "./jni" ]; then
          echo "❌ Нет папки /jni/!"
          exit 1
        fi
        
        # Пути
        NDK_PATH=$ANDROID_HOME/ndk-bundle
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        SYSROOT=$NDK_PATH/sysroot
        OUTPUT_DIR=./libs
        
        API_LEVEL=29
        
        # ДОБАВЛЕНО: путь к заголовкам GLES
        INCLUDES="-I./jni \
                  -I$SYSROOT/usr/include \
                  -I$SYSROOT/usr/include/aarch64-linux-android \
                  -I$NDK_PATH/sources/third_party/libigl/include \
                  -I$NDK_PATH/sources/android/native_app_glue"
        
        CXXFLAGS="-O2 -fPIC -std=c++17 \
                  -stdlib=libc++ \
                  -D__ANDROID_API__=$API_LEVEL \
                  -DANDROID \
                  -D__ANDROID__ \
                  -DIMGUI_IMPL_OPENGL_ES3 \
                  -D__STDC_FORMAT_MACROS \
                  -Wall -Wextra \
                  -Wno-unused-parameter \
                  -DGL_GLEXT_PROTOTYPES"
        
        LDFLAGS="-shared \
                 -Wl,-soname,libnative.so \
                 -lm -lGLESv3 -lEGL \
                 -landroid \
                 -llog \
                 -lc++_static"
        
        for ARCH in arm64-v8a; do
          echo ""
          echo "🔨 Компиляция для $ARCH..."
          
          case $ARCH in
            arm64-v8a)   CLANG="$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++" ;;
          esac
          
          mkdir -p "$OUTPUT_DIR/$ARCH"
          
          OBJS=""
          
          # Файлы в корне /jni/
          for SRC in ./jni/*.cpp; do
            [ -f "$SRC" ] || continue
            BASENAME=$(basename "$SRC" .cpp)
            OBJ="$OUTPUT_DIR/$ARCH/$BASENAME.o"
            echo "  → $BASENAME.cpp"
            $CLANG -c $CXXFLAGS $INCLUDES "$SRC" -o "$OBJ" || exit 1
            OBJS="$OBJS $OBJ"
          done  
          
          if [ -z "$OBJS" ]; then
            echo "  ⚠️ Нет файлов для компиляции!"
            continue
          fi
          
          echo "  → Линковка libnative.so"
          $CLANG $LDFLAGS $OBJS -o "$OUTPUT_DIR/$ARCH/libnative.so" || exit 1
          
          echo "  ✅ libnative.so ($ARCH) - $(ls -lh $OUTPUT_DIR/$ARCH/libnative.so | awk '{print $5}')"
        done
        
        echo ""
        echo "✅ Компиляция завершена!"
        find ./libs -name "*.so" -type f -exec ls -lh {} \;
    
    - name: Upload libraries
      uses: actions/upload-artifact@v4
      with:
        name: jni-libs-android10
        path: libs/
        retention-days: 30
