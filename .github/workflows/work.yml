# .github/workflows/ndk-build.yml
name: Build JNI with ImGui for Android 10+

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false
    
    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      with:
        packages: ndk-bundle
    
    - name: Download and clean ImGui
      run: |
        if [ ! -d "./jni/imgui" ] || [ -z "$(ls -A ./jni/imgui 2>/dev/null)" ]; then
          echo "рЯУ• –°–Ї–∞—З–Є–≤–∞–µ–Љ ImGui..."
          git clone --depth 1 https://github.com/ocornut/imgui.git ./jni/imgui_temp
          mkdir -p ./jni/imgui
          cp -r ./jni/imgui_temp/* ./jni/imgui/
          rm -rf ./jni/imgui_temp
          rm -rf ./jni/imgui/.git
          rm -rf ./jni/imgui/.github
          rm -rf ./jni/imgui/examples
          rm -rf ./jni/imgui/docs
        fi
        
        echo "рЯІє –£–і–∞–ї—П–µ–Љ –љ–µ–љ—Г–ґ–љ—Л–µ –±–µ–Ї–µ–љ–і—Л..."
        # –£–і–∞–ї—П–µ–Љ –≤—Б–µ –±–µ–Ї–µ–љ–і—Л, –Ї—А–Њ–Љ–µ Android –Є OpenGL3
        cd ./jni/imgui/backends
        
        # –°–њ–Є—Б–Њ–Ї –±–µ–Ї–µ–љ–і–Њ–≤ –і–ї—П —Г–і–∞–ї–µ–љ–Є—П (–≤—Б–µ –Ї—А–Њ–Љ–µ Android –Є OpenGL3)
        rm -f imgui_impl_allegro5.cpp imgui_impl_allegro5.h
        rm -f imgui_impl_dx9.cpp imgui_impl_dx9.h
        rm -f imgui_impl_dx10.cpp imgui_impl_dx10.h
        rm -f imgui_impl_dx11.cpp imgui_impl_dx11.h
        rm -f imgui_impl_dx12.cpp imgui_impl_dx12.h
        rm -f imgui_impl_glfw.cpp imgui_impl_glfw.h
        rm -f imgui_impl_glut.cpp imgui_impl_glut.h
        rm -f imgui_impl_osx.cpp imgui_impl_osx.h
        rm -f imgui_impl_sdl2.cpp imgui_impl_sdl2.h
        rm -f imgui_impl_sdl3.cpp imgui_impl_sdl3.h
        rm -f imgui_impl_win32.cpp imgui_impl_win32.h
        rm -f imgui_impl_wgpu.cpp imgui_impl_wgpu.h
        rm -f imgui_impl_vulkan.cpp imgui_impl_vulkan.h
        rm -f imgui_impl_metal.mm imgui_impl_metal.h
        
        # –Ю—Б—В–∞–≤–ї—П–µ–Љ —В–Њ–ї—М–Ї–Њ Android –Є OpenGL3
        echo "вЬЕ –Ю—Б—В–∞–≤–ї–µ–љ—Л —В–Њ–ї—М–Ї–Њ Android –Є OpenGL3 –±–µ–Ї–µ–љ–і—Л:"
        ls -la *.cpp *.h 2>/dev/null | grep -E "android|opengl3" || echo "–Я—А–Њ–≤–µ—А—М —Д–∞–є–ї—Л"
        cd ../../..
    
    - name: Fix include paths
      run: |
        if [ -f "./jni/main.cpp" ]; then
          sed -i 's|#include <\./imgui/|#include <imgui/|g' ./jni/main.cpp
          sed -i 's|#include "\./imgui/|#include "imgui/|g' ./jni/main.cpp
          echo "вЬЕ Include paths fixed"
        fi
    
    - name: Compile JNI with ImGui for Android 10+
      run: |
        if [ ! -d "./jni" ]; then
          echo "вЭМ –Э–µ—В –њ–∞–њ–Ї–Є /jni/!"
          exit 1
        fi
        
        echo "рЯУБ –°—В—А—Г–Ї—В—Г—А–∞ /jni/imgui/backends/:"
        ls -la ./jni/imgui/backends/ | head -20
        
        # –Я—Г—В–Є
        NDK_PATH=$ANDROID_HOME/ndk-bundle
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        SYSROOT=$NDK_PATH/sysroot
        OUTPUT_DIR=./libs
        
        API_LEVEL=29
        
        INCLUDES="-I./jni \
                  -I./jni/imgui \
                  -I./jni/imgui/backends \
                  -I$SYSROOT/usr/include \
                  -I$SYSROOT/usr/include/aarch64-linux-android"
        
        CXXFLAGS="-O2 -fPIC -std=c++17 \
                  -stdlib=libc++ \
                  -D__ANDROID_API__=$API_LEVEL \
                  -DANDROID \
                  -D__ANDROID__ \
                  -DIMGUI_IMPL_OPENGL_ES3 \
                  -D__STDC_FORMAT_MACROS \
                  -Wall -Wextra \
                  -Wno-unused-parameter"
        
        LDFLAGS="-shared \
                 -Wl,-soname,libnative.so \
                 -lm -lGLESv3 -lEGL \
                 -landroid \
                 -llog \
                 -lc++_static"
        
        for ARCH in arm64-v8a armeabi-v7a x86_64 x86; do
          echo ""
          echo "рЯФ® –Ъ–Њ–Љ–њ–Є–ї—П—Ж–Є—П –і–ї—П $ARCH..."
          
          case $ARCH in
            arm64-v8a)   CLANG="$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++" ;;
            armeabi-v7a) CLANG="$TOOLCHAIN/bin/armv7a-linux-androideabi${API_LEVEL}-clang++" ;;
            x86_64)      CLANG="$TOOLCHAIN/bin/x86_64-linux-android${API_LEVEL}-clang++" ;;
            x86)         CLANG="$TOOLCHAIN/bin/i686-linux-android${API_LEVEL}-clang++" ;;
          esac
          
          mkdir -p "$OUTPUT_DIR/$ARCH"
          
          OBJS=""
          
          # –§–∞–є–ї—Л –≤ –Ї–Њ—А–љ–µ /jni/
          for SRC in ./jni/*.cpp; do
            [ -f "$SRC" ] || continue
            BASENAME=$(basename "$SRC" .cpp)
            OBJ="$OUTPUT_DIR/$ARCH/$BASENAME.o"
            echo "  вЖТ $BASENAME.cpp"
            $CLANG -c $CXXFLAGS $INCLUDES "$SRC" -o "$OBJ" || exit 1
            OBJS="$OBJS $OBJ"
          done
          
          # –§–∞–є–ї—Л –≤ /jni/imgui/ - —В–Њ–ї—М–Ї–Њ –Њ—Б–љ–Њ–≤–љ—Л–µ
          if [ -d "./jni/imgui" ]; then
            for SRC in ./jni/imgui/*.cpp; do
              [ -f "$SRC" ] || continue
              BASENAME=$(basename "$SRC" .cpp)
              # –Я—А–Њ–њ—Г—Б–Ї–∞–µ–Љ demo —Д–∞–є–ї (–Њ–љ –±–Њ–ї—М—И–Њ–є –Є –љ–µ–Њ–±—П–Ј–∞—В–µ–ї—М–љ—Л–є)
              if [ "$BASENAME" == "imgui_demo" ]; then
                echo "  вП≠пЄП –Я—А–Њ–њ—Г—Б–Ї–∞–µ–Љ imgui_demo.cpp"
                continue
              fi
              OBJ="$OUTPUT_DIR/$ARCH/imgui_$BASENAME.o"
              echo "  вЖТ imgui/$BASENAME.cpp"
              $CLANG -c $CXXFLAGS $INCLUDES "$SRC" -o "$OBJ" || exit 1
              OBJS="$OBJS $OBJ"
            done
          fi
          
          # –Ґ–Њ–ї—М–Ї–Њ Android –Є OpenGL3 –±–µ–Ї–µ–љ–і—Л
          if [ -d "./jni/imgui/backends" ]; then
            for BACKEND in imgui_impl_android imgui_impl_opengl3; do
              SRC="./jni/imgui/backends/${BACKEND}.cpp"
              if [ -f "$SRC" ]; then
                OBJ="$OUTPUT_DIR/$ARCH/${BACKEND}.o"
                echo "  вЖТ backends/${BACKEND}.cpp"
                $CLANG -c $CXXFLAGS $INCLUDES "$SRC" -o "$OBJ" || exit 1
                OBJS="$OBJS $OBJ"
              fi
            done
          fi
          
          if [ -z "$OBJS" ]; then
            echo "  вЪ†пЄП –Э–µ—В —Д–∞–є–ї–Њ–≤ –і–ї—П –Ї–Њ–Љ–њ–Є–ї—П—Ж–Є–Є!"
            continue
          fi
          
          echo "  вЖТ –Ы–Є–љ–Ї–Њ–≤–Ї–∞ libnative.so"
          $CLANG $LDFLAGS $OBJS -o "$OUTPUT_DIR/$ARCH/libnative.so" || exit 1
          
          echo "  вЬЕ libnative.so ($ARCH) - $(ls -lh $OUTPUT_DIR/$ARCH/libnative.so | awk '{print $5}')"
        done
        
        echo ""
        echo "вЬЕ –Ъ–Њ–Љ–њ–Є–ї—П—Ж–Є—П –Ј–∞–≤–µ—А—И–µ–љ–∞!"
        find ./libs -name "*.so" -type f -exec ls -lh {} \;
    
    - name: Upload libraries
      uses: actions/upload-artifact@v4
      with:
        name: jni-libs-android10
        path: libs/
        retention-days: 30
