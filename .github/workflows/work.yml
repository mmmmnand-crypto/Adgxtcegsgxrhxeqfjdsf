# .github/workflows/ndk-build.yml
name: Build JNI with ImGui for Android 10+

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Android NDK
      uses: android-actions/setup-android@v3
      with:
        packages: ndk-bundle
    
    - name: Compile JNI with ImGui for Android 10+
      run: |
        if [ ! -d "./jni" ]; then
          echo "❌ Нет папки /jni/!"
          exit 1
        fi
        
        echo "📁 Структура /jni/:"
        ls -la ./jni/
        
        if [ -d "./jni/imgui" ]; then
          echo "✅ Найдена папка imgui/"
          ls -la ./jni/imgui/ | head -20
        else
          echo "⚠️ Папка imgui/ не найдена в /jni/"
        fi
        
        # Пути
        NDK_PATH=$ANDROID_HOME/ndk-bundle
        TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
        SYSROOT=$NDK_PATH/sysroot
        OUTPUT_DIR=./libs
        
        # Android 10 = API 29
        API_LEVEL=29
        
        # Пути для заголовков - указываем все папки с imgui
        INCLUDES="-I./jni \
                  -I./jni/imgui \
                  -I./jni/imgui/backends \
                  -I$SYSROOT/usr/include \
                  -I$SYSROOT/usr/include/aarch64-linux-android"
        
        echo "📌 Include пути:"
        echo "$INCLUDES" | tr ' ' '\n'
        
        # Флаги компиляции
        CXXFLAGS="-O2 -fPIC -std=c++17 \
                  -D__ANDROID_API__=$API_LEVEL \
                  -DANDROID \
                  -D__ANDROID__ \
                  -DIMGUI_IMPL_OPENGL_ES3 \
                  -Wall -Wextra"
        
        LDFLAGS="-shared \
                 -Wl,-soname,libnative.so \
                 -lm -lGLESv3 -lEGL \
                 -landroid \
                 -llog \
                 -lc++_static"
        
        # Компиляция для всех архитектур
        for ARCH in arm64-v8a armeabi-v7a x86_64 x86; do
          echo ""
          echo "🔨 Компиляция для $ARCH..."
          
          case $ARCH in
            arm64-v8a)   CLANG="$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++" ;;
            armeabi-v7a) CLANG="$TOOLCHAIN/bin/armv7a-linux-androideabi${API_LEVEL}-clang++" ;;
            x86_64)      CLANG="$TOOLCHAIN/bin/x86_64-linux-android${API_LEVEL}-clang++" ;;
            x86)         CLANG="$TOOLCHAIN/bin/i686-linux-android${API_LEVEL}-clang++" ;;
          esac
          
          mkdir -p "$OUTPUT_DIR/$ARCH"
          
          # Собираем все .cpp файлы из /jni/ и /jni/imgui/
          OBJS=""
          
          # Файлы в корне /jni/
          for SRC in ./jni/*.cpp; do
            [ -f "$SRC" ] || continue
            BASENAME=$(basename "$SRC" .cpp)
            OBJ="$OUTPUT_DIR/$ARCH/$BASENAME.o"
            echo "  → $BASENAME.cpp (корень jni)"
            $CLANG -c $CXXFLAGS $INCLUDES "$SRC" -o "$OBJ"
            OBJS="$OBJS $OBJ"
          done
          
          # Файлы в /jni/imgui/
          if [ -d "./jni/imgui" ]; then
            for SRC in ./jni/imgui/*.cpp; do
              [ -f "$SRC" ] || continue
              BASENAME=$(basename "$SRC" .cpp)
              OBJ="$OUTPUT_DIR/$ARCH/imgui_$BASENAME.o"
              echo "  → imgui/$BASENAME.cpp"
              $CLANG -c $CXXFLAGS $INCLUDES "$SRC" -o "$OBJ"
              OBJS="$OBJS $OBJ"
            done
          fi
          
          # Файлы в /jni/imgui/backends/
          if [ -d "./jni/imgui/backends" ]; then
            for SRC in ./jni/imgui/backends/*.cpp; do
              [ -f "$SRC" ] || continue
              BASENAME=$(basename "$SRC" .cpp)
              OBJ="$OUTPUT_DIR/$ARCH/backends_$BASENAME.o"
              echo "  → imgui/backends/$BASENAME.cpp"
              $CLANG -c $CXXFLAGS $INCLUDES "$SRC" -o "$OBJ"
              OBJS="$OBJS $OBJ"
            done
          fi
          
          # Собираем .c файлы если есть
          for SRC in ./jni/*.c; do
            [ -f "$SRC" ] || continue
            BASENAME=$(basename "$SRC" .c)
            OBJ="$OUTPUT_DIR/$ARCH/$BASENAME.o"
            echo "  → $BASENAME.c"
            $CLANG -c $CXXFLAGS $INCLUDES "$SRC" -o "$OBJ"
            OBJS="$OBJS $OBJ"
          done
          
          if [ -z "$OBJS" ]; then
            echo "  ⚠️ Нет файлов для компиляции!"
            continue
          fi
          
          # Линковка в libnative.so
          echo "  → Линковка libnative.so"
          $CLANG $LDFLAGS $OBJS -o "$OUTPUT_DIR/$ARCH/libnative.so"
          
          # Проверка
          echo "  ✅ libnative.so ($ARCH) - $(ls -lh $OUTPUT_DIR/$ARCH/libnative.so | awk '{print $5}')"
          readelf -h "$OUTPUT_DIR/$ARCH/libnative.so" | grep -E "Machine|Class" | sed 's/^/    /'
        done
        
        echo ""
        echo "✅ Компиляция завершена!"
        echo "📦 Собраны библиотеки:"
        find ./libs -name "*.so" -type f -exec ls -lh {} \;
        
        echo ""
        echo "📂 Размеры библиотек по архитектурам:"
        du -sh ./libs/*/
    
    - name: Upload libraries
      uses: actions/upload-artifact@v4
      with:
        name: jni-libs-android10
        path: libs/
        retention-days: 30
    
    - name: Create release package
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        zip -r jni-android10-libs.zip libs/
        echo "📦 Пакет создан: jni-android10-libs.zip"
        ls -lh jni-android10-libs.zip
    
    - name: Upload release package
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: jni-android10-release
        path: jni-android10-libs.zip
